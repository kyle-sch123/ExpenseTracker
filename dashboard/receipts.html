<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Receipts — Receipt Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <a href="index.html" class="back-link">← Dashboard</a>
        <div class="logo">
          <span class="logo-mark">◈</span>
          <span class="logo-text">receipts</span>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="page-header">
        <h1 class="page-title">All Receipts</h1>
        <div class="page-count" id="pageCount">— receipts</div>
      </div>

      <div class="filter-bar">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input
            type="text"
            class="filter-input"
            id="searchInput"
            placeholder="Search merchants, items…"
            autocomplete="off"
          >
        </div>
        <select class="filter-select" id="categoryFilter">
          <option value="">All categories</option>
          <option value="groceries">Groceries</option>
          <option value="dining">Dining</option>
          <option value="shopping">Shopping</option>
          <option value="gas">Gas</option>
          <option value="pharmacy">Pharmacy</option>
          <option value="entertainment">Entertainment</option>
          <option value="utilities">Utilities</option>
          <option value="other">Other</option>
        </select>
        <select class="filter-select" id="sortFilter">
          <option value="date">Newest first</option>
          <option value="total">Highest amount</option>
          <option value="merchant">Merchant A–Z</option>
        </select>
      </div>

      <div class="receipts-list" id="receiptsList">
        <div class="loading-state">Loading receipts…</div>
      </div>

      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Edit Receipt</h3>
        <button class="modal-close" id="closeModal" aria-label="Close">×</button>
      </div>
      <form class="modal-form" id="editForm">
        <div class="form-row">
          <label class="form-label" for="editMerchant">Merchant</label>
          <input type="text" class="form-input" id="editMerchant" autocomplete="off">
        </div>
        <div class="form-row">
          <label class="form-label" for="editTotal">Total</label>
          <input type="number" step="0.01" min="0" class="form-input" id="editTotal">
        </div>
        <div class="form-row">
          <label class="form-label" for="editDate">Date</label>
          <input type="date" class="form-input" id="editDate">
        </div>
        <div class="form-row">
          <label class="form-label" for="editCategory">Category</label>
          <select class="form-input" id="editCategory">
            <option value="groceries">Groceries</option>
            <option value="dining">Dining</option>
            <option value="shopping">Shopping</option>
            <option value="gas">Gas</option>
            <option value="pharmacy">Pharmacy</option>
            <option value="entertainment">Entertainment</option>
            <option value="utilities">Utilities</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label" for="editPayment">Payment Method</label>
          <input type="text" class="form-input" id="editPayment" placeholder="e.g. credit card, cash">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelEdit">Cancel</button>
          <button type="submit" class="btn btn-accent">Save changes</button>
        </div>
      </form>
    </div>
  </div>

  <nav class="mobile-nav">
    <a href="index.html" class="mobile-nav-item">
      <span class="mobile-nav-icon">◈</span>
      <span class="mobile-nav-label">Dashboard</span>
    </a>
    <a href="receipts.html" class="mobile-nav-item active">
      <span class="mobile-nav-icon">≡</span>
      <span class="mobile-nav-label">Receipts</span>
    </a>
  </nav>

  <script src="js/receipts.js"></script>
</body>
</html>
